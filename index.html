<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عقارات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>مدير العروض العقارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   THEME VARIABLES — SELLERS (gold) & BUYERS (emerald)
═══════════════════════════════════════════════ */
:root {
  /* Shared */
  --bg:#0f172a; --surf:#1e293b; --surf2:#0d1117; --surf3:#162032;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#f1f5f9; --muted:#94a3b8; --dim:#475569;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6; --purple:#a855f7;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);

  /* Seller theme (gold) */
  --primary:#f59e0b; --primary-d:#d97706; --primary-l:#fbbf24;
  --primary-bg:rgba(245,158,11,.08); --primary-border:rgba(245,158,11,.25);
  --primary-glow:rgba(245,158,11,.3);
  --hdr-from:#1a2744; --hdr-to:#0f172a;

  /* Transition */
  --theme-speed: 0.5s;
}

/* BUYER THEME overrides */
body.buyers {
  --primary:#10b981; --primary-d:#059669; --primary-l:#34d399;
  --primary-bg:rgba(16,185,129,.08); --primary-border:rgba(16,185,129,.25);
  --primary-glow:rgba(16,185,129,.3);
  --hdr-from:#0d2818; --hdr-to:#0a1f14;
}

/* Smooth transitions on all theme-aware elements */
body, .hdr, .stat, .fpill.on, .dbtn, .tbtn.on,
.btn.b-gold, .neg-toggle, .inp, .card,
.tab.on, .sort-btn.on, .filter-panel,
.af-tag, .link-box, .kpi, .bar-fill,
[class*="b-gold"], [class*="primary"] {
  transition:
    background var(--theme-speed) ease-in-out,
    border-color var(--theme-speed) ease-in-out,
    color var(--theme-speed) ease-in-out,
    box-shadow var(--theme-speed) ease-in-out;
}

*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;-webkit-text-size-adjust:100%}
body{margin:0;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100%}
input,select,textarea{font-size:16px!important;font-family:'Tajawal',sans-serif}

@media(max-width:639px){
  body{position:fixed;width:100%;top:0;left:0;right:0;bottom:0;overflow:hidden}
  #app{height:100%;overflow:hidden}
  .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
}
@media(min-width:640px){
  body{padding:calc(var(--st)+16px) 16px calc(var(--sb)+16px);background:#060d1a}
  #app{border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7)}
  .scroll{overflow-y:auto;max-height:calc(100vh - 300px)}
}

#app{display:flex;flex-direction:column;width:100%;max-width:680px;margin:0 auto;background:var(--bg);position:relative}

/* ─── Header ─────────────────────────────── */
.hdr{background:linear-gradient(160deg,var(--hdr-from) 0%,var(--hdr-to) 100%);padding:calc(var(--st)+10px) 14px 10px;border-bottom:1px solid var(--primary-border);flex-shrink:0;transition:background var(--theme-speed) ease-in-out,border-color var(--theme-speed) ease-in-out}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--primary),var(--primary-d));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 16px var(--primary-glow);transition:background var(--theme-speed) ease-in-out,box-shadow var(--theme-speed) ease-in-out}
.hdr-title{font-size:15px;font-weight:900;color:var(--text);line-height:1.2}
.hdr-sub{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background var(--theme-speed)}
.hdr-badge{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;cursor:pointer;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ─── MODE TOGGLE (Sellers / Buyers) ────── */
.mode-toggle-wrap{display:flex;align-items:center;justify-content:center;margin-top:10px;margin-bottom:2px}
.mode-toggle{display:flex;background:rgba(0,0,0,.35);border-radius:22px;padding:3px;gap:0;border:1px solid var(--border2);position:relative}
.mode-btn{padding:6px 18px;border-radius:18px;font-size:12px;font-weight:900;font-family:'Tajawal',sans-serif;border:none;cursor:pointer;color:var(--muted);background:transparent;transition:all var(--theme-speed) ease-in-out;position:relative;z-index:1;white-space:nowrap;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.mode-btn.on{color:#fff}
.mode-slider{position:absolute;top:3px;bottom:3px;border-radius:18px;transition:all var(--theme-speed) cubic-bezier(.4,0,.2,1);z-index:0}
body:not(.buyers) .mode-slider{left:3px;right:50%;background:linear-gradient(135deg,#f59e0b,#d97706)}
body.buyers .mode-slider{left:50%;right:3px;background:linear-gradient(135deg,#10b981,#059669)}

/* ─── Stats bar ──────────────────────────── */
.stats{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{flex:0 0 auto;border-radius:10px;padding:6px 12px;text-align:center;border:1px solid;min-width:60px;cursor:pointer;transition:transform .13s,opacity .13s,background var(--theme-speed),border-color var(--theme-speed)}
.stat:active{transform:scale(.92)}
.stat.on{outline:2px solid var(--primary);outline-offset:1px}
.stat-n{font-size:19px;font-weight:900;line-height:1}
.stat-l{font-size:9px;color:var(--muted);margin-top:1px}

/* ─── Scroll ─────────────────────────────── */
.scroll{flex:1;overscroll-behavior:contain;padding:11px 12px 6px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* ─── Tabs ───────────────────────────────── */
.tabs{display:flex;background:var(--surf2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--sb)}
.tab{flex:1;padding:8px 0 6px;border:none;background:transparent;color:var(--dim);font-size:10px;font-family:'Tajawal',sans-serif;cursor:pointer;font-weight:700;border-top:2.5px solid transparent;transition:color var(--theme-speed),border-color var(--theme-speed);touch-action:manipulation;-webkit-user-select:none;user-select:none;position:relative}
.tab.on{color:var(--primary);border-top-color:var(--primary)}
.tab-ic{font-size:18px;display:block;margin-bottom:1px}
.tab-badge{position:absolute;top:5px;right:calc(50% - 18px);background:#ef4444;color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--surf2)}

/* ─── Inputs ─────────────────────────────── */
.inp{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid #2a3548;background:var(--surf2);color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;-webkit-appearance:none;outline:none;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-bg)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical}
.lbl{display:block;color:var(--muted);font-size:11px;margin-bottom:4px;font-weight:700}
.field{margin-bottom:12px}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

/* ─── Buttons ────────────────────────────── */
.btn{border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation;width:100%;display:block}
.btn:active{transform:scale(.96)}
.b-primary{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 4px 16px var(--primary-glow);transition:background var(--theme-speed) ease-in-out,box-shadow var(--theme-speed)}
.b-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.b-red{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.b-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.b-green{background:linear-gradient(135deg,#059669,#065f46);color:#fff}
.b-blue{background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff}
.b-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff}
.b-teal{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.b-sm{padding:8px 12px;font-size:12px;border-radius:9px;width:auto;display:inline-block}
.wa-btn{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}

/* ─── Chip ───────────────────────────────── */
.chip{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;color:#fff}

/* ─── Direction buttons ──────────────────── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dbtn{border-radius:11px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border-width:2px;border-style:solid;text-align:center}
.dbtn:active{transform:scale(.95)}

/* ─── Type buttons ───────────────────────── */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tbtn{border-radius:10px;padding:10px 5px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border:2px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);text-align:center}
.tbtn.on{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.tbtn:active{transform:scale(.94)}

/* ─── Filter pills ───────────────────────── */
.filter-row{display:flex;gap:5px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fpill{flex:0 0 auto;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;touch-action:manipulation;transition:all .15s}
.fpill.on{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}
.fpill:active{transform:scale(.93)}

/* ─── Cards ──────────────────────────────── */
.card{border-radius:14px;padding:12px 13px;margin-bottom:8px;border-width:1.5px;border-style:solid;cursor:pointer;transition:transform .13s,filter .13s;-webkit-user-select:none;user-select:none;touch-action:manipulation;position:relative}
.card:active{transform:scale(.985);filter:brightness(.87)}

/* Buyer card style */
.buyer-card{background:rgba(16,185,129,.05) !important;border-color:rgba(16,185,129,.3) !important}

/* ─── Inbox card ─────────────────────────── */
.inbox-card{border-radius:14px;padding:13px 14px;margin-bottom:8px;background:var(--surf3);border:1.5px solid var(--border2);position:relative;cursor:pointer}

/* ─── Overlay / Sheet ────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surf);border-radius:22px 22px 0 0;width:100%;max-width:680px;padding:20px 16px;padding-bottom:calc(20px + var(--sb));max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;animation:sUp .22s ease}
.sheet::-webkit-scrollbar{display:none}
@keyframes sUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 16px}

/* ─── Toast ──────────────────────────────── */
.toast{position:fixed;top:calc(var(--st)+12px);left:50%;transform:translateX(-50%);z-index:999;color:#fff;padding:9px 18px;border-radius:12px;font-weight:800;font-size:12px;font-family:'Tajawal',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.55);white-space:nowrap;max-width:90vw;animation:tIn .22s ease}
@keyframes tIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* ─── Detail rows (IMPROVED CONTRAST) ───── */
.det-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.det-row:last-child{border-bottom:none}
.det-k{color:#94a3b8;font-size:13px;font-weight:600}
.det-v{color:#f1f5f9;font-size:13px;font-weight:800;max-width:58%;text-align:left;word-break:break-all}
.act-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.act-row .btn{flex:1;min-width:76px}

/* ─── Search ─────────────────────────────── */
.srow{display:flex;gap:7px;margin-bottom:9px}
.swrap{flex:1;position:relative}
.sic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.sinp{padding-right:34px}

/* ─── Empty ──────────────────────────────── */
.empty{text-align:center;color:var(--dim);padding:50px 20px}
.e-ic{font-size:46px;margin-bottom:10px}
.e-t{font-size:14px;font-weight:800;color:var(--muted)}
.e-s{color:var(--dim);font-size:11px;margin-top:4px}

/* ─── Misc ───────────────────────────────── */
.sec-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;color:var(--text);margin-bottom:14px}
.form-note{text-align:center;color:var(--dim);font-size:10px;margin-top:12px}
.active-filters{display:flex;gap:5px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.af-tag{background:var(--primary-bg);border:1px solid var(--primary-border);color:var(--primary);font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;display:flex;align-items:center;gap:3px}
.af-x{cursor:pointer;font-size:12px;line-height:1}

/* ─── Filter panel ───────────────────────── */
.filter-panel{background:var(--surf3);border:1px solid var(--border2);border-radius:14px;padding:13px;margin-bottom:10px}
.filter-panel-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px}
.range-row{display:flex;gap:7px;align-items:center}
.range-row .inp{text-align:center}
.range-sep{color:var(--dim);font-size:11px;flex-shrink:0}

/* ─── Neg toggle ─────────────────────────── */
.neg-toggle{display:flex;align-items:center;gap:9px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s}
.neg-toggle.on{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4)}
.neg-dot{width:20px;height:20px;border-radius:6px;border:2px solid #2a3548;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0}
.neg-toggle.on .neg-dot{background:#22c55e;border-color:#22c55e}
.neg-label{font-size:12px;font-weight:800;color:var(--muted)}
.neg-toggle.on .neg-label{color:#22c55e}

/* ─── Sort bar ───────────────────────────── */
.sort-bar{display:flex;gap:6px;margin-bottom:9px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{flex:0 0 auto;padding:5px 11px;border-radius:8px;font-size:11px;font-weight:800;border:1.5px solid #2a3548;background:rgba(255,255,255,.03);color:var(--dim);cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .15s}
.sort-btn.on{background:var(--primary-bg);border-color:var(--primary);color:var(--primary)}

/* ─── Inbox link box ─────────────────────── */
.link-box{background:var(--surf2);border:1.5px dashed var(--primary-border);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.link-url{flex:1;font-size:11px;color:var(--muted);word-break:break-all;direction:ltr;text-align:right;line-height:1.5}
.link-copy-btn{flex-shrink:0;padding:8px 12px;border-radius:9px;background:var(--primary-bg);border:1px solid var(--primary-border);color:var(--primary);font-size:11px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .15s}
.link-copy-btn:active{transform:scale(.93)}

/* ─── Date badge ─────────────────────────── */
.date-badge{font-size:9px;color:var(--dim);display:flex;align-items:center;gap:3px}

/* ─── KPI grid ───────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.kpi-n{font-size:22px;font-weight:900;line-height:1;color:var(--primary);transition:color var(--theme-speed)}
.kpi-l{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.bar-row{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid var(--border)}
.bar-track{flex:1;background:rgba(255,255,255,.05);border-radius:5px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease}

/* ─── Client type selector ───────────────── */
.ctype-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ctype-btn{border-radius:12px;padding:13px 8px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Tajawal',sans-serif;border:2px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);text-align:center;transition:all .2s;touch-action:manipulation}
.ctype-btn.seller.on{border-color:#f59e0b;background:rgba(245,158,11,.12);color:#f59e0b}
.ctype-btn.buyer.on{border-color:#10b981;background:rgba(16,185,129,.12);color:#10b981}
.ctype-btn:active{transform:scale(.95)}

/* ─── Matching page ──────────────────────── */
.match-card{border-radius:14px;padding:14px;margin-bottom:10px;background:var(--surf3);border:1.5px solid var(--border2);transition:border-color .2s}
.match-score{font-size:22px;font-weight:900;line-height:1}
.match-bar{height:8px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden;margin:6px 0}
.match-fill{height:100%;border-radius:4px;transition:width .8s ease}
.match-tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;margin:2px}

/* ─── Section divider ────────────────────── */
.sec-div{font-size:11px;font-weight:900;color:var(--muted);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}

/* ─── Inline mode badge ──────────────────── */
.mode-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:900}
.mode-badge.seller{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.mode-badge.buyer{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-icon" id="hdrIcon">🏠</div>
      <div style="flex:1;min-width:0">
        <div class="hdr-title" id="hdrTitle">مدير العروض العقارية</div>
        <div class="hdr-sub">
          <span class="sdot" id="sdot"></span>
          <span id="stxt">جاري التحميل...</span>
        </div>
      </div>
      <div id="inboxBadgeHdr" style="display:none" class="hdr-badge" onclick="goTab(3)">📥 <span id="inboxCount">0</span> جديد</div>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-toggle-wrap">
      <div class="mode-toggle">
        <div class="mode-slider" id="modeSlider"></div>
        <button class="mode-btn on" id="modeSellerBtn" onclick="setMode('sellers')">🏷️ البائعين</button>
        <button class="mode-btn" id="modeBuyerBtn" onclick="setMode('buyers')">🛒 المشترين</button>
      </div>
    </div>

    <div class="stats" id="statsRow"></div>
  </div>

  <div class="scroll" id="scroll"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" id="t0" onclick="goTab(0)"><span class="tab-ic">📋</span>العروض</button>
    <button class="tab" id="t1" onclick="goTab(1)"><span class="tab-ic">➕</span>إضافة</button>
    <button class="tab" id="t4" onclick="goTab(4)"><span class="tab-ic">🤝</span>مطابقة</button>

<script>
// ══════════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════════
const DC = {
  'شمال':{bg:'rgba(239,68,68,.1)',border:'#fca5a580',badge:'#ef4444',text:'#fca5a5'},
  'جنوب':{bg:'rgba(202,138,4,.1)',border:'#fde04780',badge:'#ca8a04',text:'#fde047'},
  'شرق': {bg:'rgba(37,99,235,.1)',border:'#93c5fd80',badge:'#2563eb',text:'#93c5fd'},
  'غرب': {bg:'rgba(22,163,74,.1)',border:'#86efac80',badge:'#16a34a',text:'#86efac'},
};
const DIRS  = ['شمال','جنوب','شرق','غرب'];
const TYPES = ['أرض','فيلا','عمارة','شقة','محل'];
const CITIES = ['الرياض','مكة المكرمة','المدينة المنورة','الشرقية','القصيم','حائل','تبوك','جازان','نجران','الباحة','الجوف','الحدود الشمالية','عسير'];

const KEY        = 'realestate_v5_sellers';
const BUYER_KEY  = 'realestate_v5_buyers';
const INBOX_KEY  = 'realestate_inbox_v5';

const BIN_ID  = '6a201cefda38895dfe80bb17';
const API_KEY = '$2a$10$fMPSjoObVoP1y5rf6NflpO9VM/6TLwITEaA4l22nUkFKSzEkfLNna';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let sellers=[], buyers=[], inbox=[];
let mode = 'sellers'; // 'sellers' | 'buyers'
let tab=0, editId=null, delId=null;
let search='', filterDirs=[], filterTypes=[], filterCities=[];
let priceMin='', priceMax='', areaMin='', areaMax='';
let sortBy='date', sortDir='desc';
let showFilterPanel=false;
let toastT=null;

// Form state
const EF = () => ({
  clientType:'seller', city:'الرياض', direction:'', neighborhood:'',
  sellerName:'', sellerPhone:'',
  propertyType:'', area:'', streetWidth:'', price:'', negotiable:false,
  // buyer-specific
  budgetMin:'', budgetMax:'', areaMin:'', areaMax:'',
  notes:'', createdAt:Date.now()
});
let form = EF();

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
function init(){
  try{ sellers = JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ sellers=[]; }
  try{ buyers  = JSON.parse(localStorage.getItem(BUYER_KEY)||'[]'); }catch(e){ buyers=[]; }
  try{ inbox   = JSON.parse(localStorage.getItem(INBOX_KEY)||'[]'); }catch(e){ inbox=[]; }
  applyTheme();
  render();
  fetchCloudInbox();
  if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(sellers)); }catch(e){}
  try{ localStorage.setItem(BUYER_KEY, JSON.stringify(buyers)); }catch(e){}
  try{ localStorage.setItem(INBOX_KEY, JSON.stringify(inbox)); }catch(e){}
  render();
}

// ══════════════════════════════════════════════════
//  THEME / MODE
// ══════════════════════════════════════════════════
function setMode(m){
  mode = m;
  applyTheme();
  // reset filters
  filterDirs=[]; filterTypes=[]; filterCities=[];
  priceMin=''; priceMax=''; areaMin=''; areaMax=''; search='';
  if(tab===0||tab===2) render(); else goTab(0);
}

function applyTheme(){
  const body = document.body;
  const sellerBtn = document.getElementById('modeSellerBtn');
  const buyerBtn  = document.getElementById('modeBuyerBtn');
  const hdrIcon   = document.getElementById('hdrIcon');
  const hdrTitle  = document.getElementById('hdrTitle');
  if(mode==='buyers'){
    body.classList.add('buyers');
    if(sellerBtn) sellerBtn.classList.remove('on');
    if(buyerBtn)  buyerBtn.classList.add('on');
    if(hdrIcon)   hdrIcon.textContent = '🛒';
    if(hdrTitle)  hdrTitle.textContent = 'مدير طلبات المشترين';
  } else {
    body.classList.remove('buyers');
    if(sellerBtn) sellerBtn.classList.add('on');
    if(buyerBtn)  buyerBtn.classList.remove('on');
    if(hdrIcon)   hdrIcon.textContent = '🏠';
    if(hdrTitle)  hdrTitle.textContent = 'مدير العروض العقارية';
  }
}

// ══════════════════════════════════════════════════
//  CLOUD SYNC
// ══════════════════════════════════════════════════
function fetchCloudInbox(){
  const dot = document.getElementById('sdot');
  if(dot) dot.style.background='#eab308';
  fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}})
  .then(r=>r.ok?r.json():Promise.reject(r.status))
  .then(data=>{
    if(Array.isArray(data)){
      const localMap=new Map(inbox.map(i=>[i.id,i.status]));
      inbox=data.map(item=>{
        if(localMap.has(item.id)) item.status=localMap.get(item.id);
        return item;
      });
      localStorage.setItem(INBOX_KEY,JSON.stringify(inbox));
    }
    if(dot) dot.style.background='#22c55e';
    render();
  })
  .catch(()=>{
    if(dot) dot.style.background='#ef4444';
    toast('⚠️ تعذر الاتصال بالسحابة','warn');
  });
}

function syncCloudInbox(){
  fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(inbox)})
  .catch(err=>console.error('sync error',err));
}

// ══════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════
function toast(msg,type='ok'){
  clearTimeout(toastT);
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  el.style.background=type==='err'?'#dc2626':type==='info'?'#0284c7':type==='warn'?'#d97706':'#15803d';
  toastT=setTimeout(()=>el.style.display='none',3000);
}

// ══════════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════════
function goTab(n){
  if(tab===1) syncFormFromDOM();
  tab=n;
  if(n!==1&&editId){ editId=null; form=EF(); form.clientType=mode==='buyers'?'buyer':'seller'; }
  [0,1,2,3,4].forEach(i=>{const el=document.getElementById('t'+i);if(el)el.className='tab'+(i===n?' on':'');});
  if(n===3) fetchCloudInbox();
  render();
}
function closeOverlay(id){ document.getElementById(id).style.display='none'; }

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function relativeDate(ts){
  if(!ts) return '';
  const diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return 'الآن';
  if(diff<3600) return 'منذ '+Math.floor(diff/60)+' دق';
  if(diff<86400) return 'منذ '+Math.floor(diff/3600)+' س';
  const d=Math.floor(diff/86400);
  if(d===1) return 'أمس';
  if(d<30) return 'منذ '+d+' يوم';
  if(d<365) return 'منذ '+Math.floor(d/30)+' شهر';
  return 'منذ '+Math.floor(d/365)+' سنة';
}
function gid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fp(v){ const n=Number(String(v).replace(/,/g,'')); return isNaN(n)?v:n.toLocaleString('ar-SA'); }
function x(s){ return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dl(content,type,name){ const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click(); }
function dateStr(){ return new Date().toLocaleDateString('ar-SA').replace(/\//g,'-'); }
function numVal(v){ return isNaN(Number(String(v||'').replace(/,/g,'')))?0:Number(String(v||'').replace(/,/g,'')); }
function copyText(t){
  if(navigator.clipboard) navigator.clipboard.writeText(t).catch(()=>{});
  else{ const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
}

// ══════════════════════════════════════════════════
//  CURRENT DATASET
// ══════════════════════════════════════════════════
function currentData(){ return mode==='sellers'?sellers:buyers; }
function setCurrentData(arr){ if(mode==='sellers') sellers=arr; else buyers=arr; }

// ══════════════════════════════════════════════════
//  FILTERS
// ══════════════════════════════════════════════════
function toggleDirFilter(d){
  const i=filterDirs.indexOf(d); if(i>=0) filterDirs.splice(i,1); else filterDirs.push(d);
  if(tab!==0) goTab(0); else render();
}
function toggleTypeFilter(t){
  const i=filterTypes.indexOf(t); if(i>=0) filterTypes.splice(i,1); else filterTypes.push(t);
  render();
}
function toggleCityFilter(c){
  const i=filterCities.indexOf(c); if(i>=0) filterCities.splice(i,1); else filterCities.push(c);
  renderCityFilterList(); render();
}
function clearFilters(){ filterDirs=[];filterTypes=[];filterCities=[];priceMin='';priceMax='';areaMin='';areaMax='';sortBy='date';sortDir='desc';render(); }

function filtered(){
  let res=[...currentData()];
  if(search.trim()){
    const q=search.trim();
    res=res.filter(o=>[o.sellerName,o.sellerPhone,o.direction,o.propertyType,o.neighborhood,o.city,o.notes].some(v=>v&&v.includes(q)));
  }
  if(filterDirs.length)   res=res.filter(o=>filterDirs.includes(o.direction));
  if(filterTypes.length)  res=res.filter(o=>filterTypes.includes(o.propertyType));
  if(filterCities.length) res=res.filter(o=>filterCities.includes(o.city||'الرياض'));
  if(mode==='sellers'){
    if(priceMin) res=res.filter(o=>numVal(o.price)>=Number(priceMin));
    if(priceMax) res=res.filter(o=>numVal(o.price)<=Number(priceMax));
    if(areaMin)  res=res.filter(o=>Number(o.area)>=Number(areaMin));
    if(areaMax)  res=res.filter(o=>Number(o.area)<=Number(areaMax));
  } else {
    if(priceMin) res=res.filter(o=>numVal(o.budgetMax)>=Number(priceMin));
    if(priceMax) res=res.filter(o=>numVal(o.budgetMin)<=Number(priceMax));
    if(areaMin)  res=res.filter(o=>Number(o.areaMin||0)>=Number(areaMin));
    if(areaMax)  res=res.filter(o=>Number(o.areaMax||9999999)<=Number(areaMax));
  }
  res.sort((a,b)=>{
    let va,vb;
    if(sortBy==='price'){
      va=mode==='sellers'?numVal(a.price):numVal(a.budgetMax);
      vb=mode==='sellers'?numVal(b.price):numVal(b.budgetMax);
    } else if(sortBy==='area'){
      va=Number(a.area||a.areaMax||0); vb=Number(b.area||b.areaMax||0);
    } else { va=a.createdAt||0; vb=b.createdAt||0; }
    return sortDir==='asc'?va-vb:vb-va;
  });
  return res;
}

// ══════════════════════════════════════════════════
//  RENDER MASTER
// ══════════════════════════════════════════════════
function render(){
  renderStats();
  const data=currentData();
  document.getElementById('stxt').textContent=
    (mode==='sellers'?sellers.length+' بائع':buyers.length+' مشتري')+' • محفوظ على جهازك';

  const pendingCount=inbox.filter(i=>i.status==='pending').length;
  const badge=document.getElementById('tabBadge');
  const hdrBadge=document.getElementById('inboxBadgeHdr');
  if(badge){ badge.style.display=pendingCount?'flex':'none'; badge.textContent=pendingCount; }
  if(hdrBadge){ hdrBadge.style.display=pendingCount?'flex':'none'; }
  document.getElementById('inboxCount').textContent=pendingCount;

  const sc=document.getElementById('scroll');
  if(tab===0)      sc.innerHTML=renderList();
  else if(tab===1) sc.innerHTML=renderForm();
  else if(tab===2) sc.innerHTML=renderStats2();
  else if(tab===3) sc.innerHTML=renderInbox();
  else if(tab===4) sc.innerHTML=renderMatching();
}

// ── Stats bar ─────────────────────────────────────
function renderStats(){
  const data=currentData();
  document.getElementById('statsRow').innerHTML=DIRS.map(d=>{
    const c=DC[d], n=data.filter(o=>o.direction===d).length;
    const active=filterDirs.includes(d);
    return '<div class="stat'+(active?' on':'')+'" style="background:'+c.badge+'20;border-color:'+c.badge+'40" onclick="toggleDirFilter(\''+d+'\')">'
      +'<div class="stat-n" style="color:'+c.badge+'">'+n+'</div>'
      +'<div class="stat-l">'+d+(active?' ✓':'')+'</div></div>';
  }).join('')
  +'<div class="stat" style="background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.3)'+(filterCities.length?';outline:2px solid var(--blue)':'')+'" onclick="openCityFilter()">'
  +'<div class="stat-n" style="color:#60a5fa;font-size:14px">🏙️</div>'
  +'<div class="stat-l" style="color:#60a5fa">'+(filterCities.length?filterCities.length+' مدن':'مدينة')+'</div></div>';
}

// ── City filter ───────────────────────────────────
function openCityFilter(){ renderCityFilterList(); document.getElementById('cityFilterOverlay').style.display='flex'; }
function renderCityFilterList(){
  const el=document.getElementById('cityFilterList'); if(!el) return;
  const data=currentData();
  el.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">'+CITIES.map(c=>{
    const n=data.filter(o=>(o.city||'الرياض')===c).length;
    const on=filterCities.includes(c);
    return '<div onclick="toggleCityFilter(\''+c+'\')" style="border-radius:10px;padding:10px 12px;border:2px solid '+(on?'var(--primary)':'#2a3548')+';background:'+(on?'var(--primary-bg)':'rgba(255,255,255,.02)')+';cursor:pointer">'
      +'<div style="font-size:13px;font-weight:800;color:'+(on?'var(--primary)':'var(--muted)')+'">'+c+'</div>'
      +'<div style="font-size:10px;color:var(--dim);margin-top:2px">'+n+' عرض</div></div>';
  }).join('')+'</div>';
}

// ══════════════════════════════════════════════════
//  LIST TAB
// ══════════════════════════════════════════════════
function renderList(){
  const fil=filtered();
  const data=currentData();
  let h='';

  h+='<div class="srow">'
    +'<div class="swrap"><span class="sic">🔍</span>'
    +'<input id="searchInp" class="inp sinp" type="search" placeholder="بحث..." value="'+x(search)+'" oninput="onSearch(this.value)" autocomplete="off"></div>'
    +'<button class="btn b-green" style="width:auto;padding:0 10px;min-width:38px" onclick="exportJSON()" title="JSON">📤</button>'
    +'<button class="btn b-blue" style="width:auto;padding:0 10px;min-width:38px" onclick="openImport()" title="استيراد">📥</button>'
    +'<button class="btn" style="background:#334155;color:#94a3b8;width:auto;padding:0 10px;min-width:38px" onclick="exportCSV()" title="CSV">📊</button>'
    +'<button class="btn '+(showFilterPanel?'b-primary':'b-ghost')+'" style="width:auto;padding:0 10px;min-width:38px" onclick="toggleFilterPanel()">⚙️</button>'
    +'</div>';

  if(showFilterPanel){
    const pLabel = mode==='sellers'?'السعر':'الميزانية';
    h+='<div class="filter-panel">'
      +'<div class="filter-panel-title">💰 نطاق '+pLabel+' (ريال)</div>'
      +'<div class="range-row" style="margin-bottom:10px">'
      +'<input class="inp" type="number" inputmode="numeric" placeholder="من" value="'+x(priceMin)+'" style="text-align:center" onchange="priceMin=this.value;render()">'
      +'<span class="range-sep">—</span>'
      +'<input class="inp" type="number" inputmode="numeric" placeholder="إلى" value="'+x(priceMax)+'" style="text-align:center" onchange="priceMax=this.value;render()">'
      +'</div>';
    if(mode==='sellers'){
      h+='<div class="filter-panel-title">📐 نطاق المساحة (م²)</div>'
        +'<div class="range-row" style="margin-bottom:10px">'
        +'<input class="inp" type="number" inputmode="numeric" placeholder="من" value="'+x(areaMin)+'" style="text-align:center" onchange="areaMin=this.value;render()">'
        +'<span class="range-sep">—</span>'
        +'<input class="inp" type="number" inputmode="numeric" placeholder="إلى" value="'+x(areaMax)+'" style="text-align:center" onchange="areaMax=this.value;render()">'
        +'</div>';
    }
    h+='<div class="filter-panel-title">🔃 ترتيب حسب</div>'
      +'<div class="sort-bar">'
      +[['date','التاريخ'],['price',mode==='sellers'?'السعر':'الميزانية'],['area','المساحة']].map(([v,l])=>
        '<button class="sort-btn'+(sortBy===v?' on':'')+'" onclick="setSortBy(\''+v+'\')" >'+l+(sortBy===v?(sortDir==='asc'?' ↑':' ↓'):'')+'</button>'
      ).join('')
      +'</div>'
      +'<button class="btn b-ghost" style="padding:7px;font-size:11px;margin-top:6px" onclick="clearFilters()">🗑️ مسح جميع الفلاتر</button>'
      +'</div>';
  }

  const anyFilter=filterDirs.length||filterTypes.length||filterCities.length||priceMin||priceMax||areaMin||areaMax;
  if(anyFilter){
    h+='<div class="active-filters">';
    filterDirs.forEach(d=>{const c=DC[d];h+='<span class="af-tag" style="background:'+c.badge+'22;border-color:'+c.badge+'66;color:'+c.badge+'">'+d+' <span class="af-x" onclick="toggleDirFilter(\''+d+'\')">✕</span></span>';});
    filterTypes.forEach(t=>{h+='<span class="af-tag">'+t+' <span class="af-x" onclick="toggleTypeFilter(\''+t+'\')">✕</span></span>';});
    filterCities.forEach(c=>{h+='<span class="af-tag" style="color:#60a5fa">'+c+' <span class="af-x" onclick="toggleCityFilter(\''+c+'\')">✕</span></span>';});
    if(priceMin||priceMax){h+='<span class="af-tag">💰 '+(priceMin||'أي')+' — '+(priceMax||'أي')+' <span class="af-x" onclick="priceMin=\'\';priceMax=\'\';render()">✕</span></span>';}
    h+='<span style="color:var(--dim);font-size:10px;cursor:pointer;text-decoration:underline" onclick="clearFilters()">مسح الكل</span></div>';
  }

  h+='<div class="filter-row">';
  h+='<span class="fpill'+(filterTypes.length===0?' on':'')+'" onclick="filterTypes=[];render()">الكل ('+data.length+')</span>';
  TYPES.forEach(t=>{
    const n=data.filter(o=>o.propertyType===t).length;
    h+='<span class="fpill'+(filterTypes.includes(t)?' on':'')+'" onclick="toggleTypeFilter(\''+t+'\')">'+t+(n?' ('+n+')':'')+'</span>';
  });
  h+='</div>';

  if(!fil.length){
    h+='<div class="empty"><div class="e-ic">'+(search||anyFilter?'🔍':mode==='sellers'?'🏠':'🛒')+'</div>'
      +'<div class="e-t">'+(search||anyFilter?'لا نتائج مطابقة':mode==='sellers'?'لا توجد عروض بيع':'لا توجد طلبات شراء')+'</div>'
      +(!search&&!anyFilter?'<div class="e-s">اضغط «إضافة» لإدخال أول '+(mode==='sellers'?'عرض':'طلب')+'</div>':'')+'</div>';
  } else {
    h+='<div style="font-size:10px;color:var(--dim);margin-bottom:6px;text-align:left">'+fil.length+' نتيجة</div>';
    fil.forEach((o,i)=>{
      if(mode==='sellers'){
        h+=renderSellerCard(o,i);

        h+=renderBuyerCard(o,i);
      }
    });
  }
  return h;
}

function syncFormFromDOM(){
  ['sellerName','sellerPhone','neighborhood','area','streetWidth','price','notes','budgetMin','budgetMax','areaMin','areaMax'].forEach(k=>{
    const el=document.getElementById('f_'+k); if(el) form[k]=el.value;
  });
  const cityEl=document.getElementById('f_city'); if(cityEl) form.city=cityEl.value;
}

  h+='<div class="field"><label class="lbl">'+(isBuyer?'اسم المشتري':'اسم البائع')+'</label>'
    +'<input id="f_sellerName" class="inp" type="text" placeholder="الاسم الكامل" value="'+x(form.sellerName||'')+'" autocomplete="off"></div>';
  h+='<div class="field"><label class="lbl">رقم الجوال</label>'
    +'<input id="f_sellerPhone" class="inp" type="tel" placeholder="05xxxxxxxx" value="'+x(form.sellerPhone||'')+'" autocomplete="off" style="direction:ltr;text-align:right"></div>';

  // Property type (for both)
  const types=TYPES.map(t=>'<button class="tbtn '+(form.propertyType===t?'on':'')+'" onclick="sfType(\''+t+'\')">'+t+'</button>').join('');

  if(!isBuyer){

    h+='<div class="dual"><div><label class="lbl">المساحة (م²)</label><input id="f_area" class="inp" type="number" inputmode="numeric" placeholder="400" value="'+x(form.area||'')+'"></div>'
      +'<div><label class="lbl">عرض الشارع (م)</label><input id="f_streetWidth" class="inp" type="number" inputmode="numeric" placeholder="15" value="'+x(form.streetWidth||'')+'"></div></div>'

      +'<input id="f_price" class="inp" type="text" inputmode="numeric" placeholder="1,200,000" value="'+x(form.price||'')+'" autocomplete="off">'

      +'<input id="f_areaMin" class="inp" type="number" inputmode="numeric" placeholder="من" value="'+x(form.areaMin||'')+'" style="text-align:center">'

  h+='<div class="field"><label class="lbl">ملاحظات وشروط خاصة</label>'

  h+='<button class="btn b-primary" style="padding:14px" onclick="submitForm()">'+(editId?'💾 حفظ التعديل':'✅ إضافة')+'</button>'
    +(editId?'<button class="btn b-ghost" style="margin-top:8px" onclick="cancelEdit()">إلغاء</button>':'')
    +'<div class="form-note">💾 البيانات محفوظة على جهازك فقط</div></div>';
  return h;
}

function setFormType(t){
  syncFormFromDOM();
  form.clientType=t;
  render();
}
function sfType(t){ syncFormFromDOM(); if(form.propertyType===t) form.propertyType=''; else form.propertyType=t; render(); }
function sf(field,val){ syncFormFromDOM(); if(form[field]===val) form[field]=''; else form[field]=val; render(); }
function toggleNeg(){ syncFormFromDOM(); form.negotiable=!form.negotiable; render(); }

function submitForm(){
  syncFormFromDOM();
  const isBuyer=form.clientType==='buyer';
  const entry={...form, id:editId||gid(), createdAt:editId?(form.createdAt||Date.now()):Date.now()};

  if(isBuyer){
    if(editId){ buyers=buyers.map(o=>o.id===editId?entry:o); }
    else buyers.unshift(entry);
  } else {
    if(editId){ sellers=sellers.map(o=>o.id===editId?entry:o); }
    else sellers.unshift(entry);
  }

  toast(editId?'✅ تم حفظ التعديل':'✅ تمت الإضافة');
  form=EF(); editId=null;
  // sync mode to entry type
  mode=isBuyer?'buyers':'sellers';
  applyTheme();
  save(); goTab(0);
}
function cancelEdit(){ syncFormFromDOM(); form=EF(); editId=null; goTab(0); }

function shareWhatsapp(id, src){
  const dataset = src==='buyers'?buyers:(src==='sellers'?sellers:[...sellers,...buyers,...inbox]);
  const o=dataset.find(z=>z.id===id)||inbox.find(z=>z.id===id);
  if(!o) return;
  const isBuyer=o.clientType==='buyer'||(src==='buyers');
  let lines;
  if(!isBuyer){
    lines=['🏠 *عرض عقاري للبيع*',
      o.city?'🏙️ المدينة: '+o.city:'',o.direction?'📍 الاتجاه: '+o.direction:'',
      o.neighborhood?'🏘️ الحي: '+o.neighborhood:'',o.sellerName?'👤 البائع: '+o.sellerName:'',
      o.sellerPhone?'📞 الجوال: '+o.sellerPhone:'',o.propertyType?'🏗️ النوع: '+o.propertyType:'',
      o.area?'📐 المساحة: '+o.area+' م²'+(o.streetWidth?' | شارع '+o.streetWidth+'م':''):'',
      o.price?'💰 السعر: '+fp(o.price)+' ﷼'+(o.negotiable?' *(قابل للتفاوض)*':''):'',
      o.notes?'📝 '+o.notes:'',
    ].filter(Boolean).join('\n');
  } else {
    lines=['🛒 *طلب شراء عقار*',
      o.city?'🏙️ المدينة: '+o.city:'',o.direction?'📍 الاتجاه المفضل: '+o.direction:'',
      o.neighborhood?'🏘️ الحي: '+o.neighborhood:'',o.sellerName?'👤 المشتري: '+o.sellerName:'',
      o.sellerPhone?'📞 الجوال: '+o.sellerPhone:'',o.propertyType?'🏗️ النوع المطلوب: '+o.propertyType:'',
      (o.budgetMin||o.budgetMax)?'💰 الميزانية: '+fp(o.budgetMin||0)+' — '+fp(o.budgetMax||0)+' ﷼':'',
      (o.areaMin||o.areaMax)?'📐 المساحة: '+o.areaMin+' — '+o.areaMax+' م²':'',
      o.notes?'📝 '+o.notes:'',
    ].filter(Boolean).join('\n');
  }
  window.open('https://wa.me/?text='+encodeURIComponent(lines),'_blank');
  closeOverlay('detOverlay'); closeOverlay('approveOverlay');
}

function shareOffer(id){
  const o=currentData().find(z=>z.id===id); if(!o) return;
  const txt=buildShareText(o);
  if(navigator.share) navigator.share({title:'عرض عقاري',text:txt}).catch(()=>{});
  else{ copyText(txt); toast('✅ تم نسخ المعلومات'); }
  closeOverlay('detOverlay');
}
function buildShareText(o){
  const isBuyer=o.clientType==='buyer';
  return (isBuyer?'🛒 طلب شراء عقار\n':'🏠 عرض عقاري للبيع\n')
    +(o.city?'🏙️ '+o.city+'\n':'')+(o.direction?'📍 '+o.direction+'\n':'')
    +(o.sellerName?'👤 '+o.sellerName+'\n':'')+(o.sellerPhone?'📞 '+o.sellerPhone+'\n':'');
}
function copyText(t){
  if(navigator.clipboard) navigator.clipboard.writeText(t).catch(()=>{});
  else{ const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta); }
}

// ── Edit / Delete ─────────────────────────────────
function startEdit(id){
  const o=currentData().find(z=>z.id===id); if(!o) return;
  form={...EF(),...o}; editId=id;
  closeOverlay('detOverlay'); goTab(1);
}
function openDel(id){ delId=id; closeOverlay('detOverlay'); document.getElementById('delOverlay').style.display='flex'; }
function confirmDel(){
  if(mode==='sellers') sellers=sellers.filter(o=>o.id!==delId);
  else buyers=buyers.filter(o=>o.id!==delId);
  toast('🗑️ تم الحذف','info'); closeOverlay('delOverlay'); save();
}
function clearAll(){
  if(!confirm('⚠️ حذف جميع '+(mode==='sellers'?'عروض البائعين':'طلبات المشترين')+'؟')) return;
  if(mode==='sellers') sellers=[];  else buyers=[];
  toast('🗑️ تم الحذف','info'); save();
}

function renderInbox(){
  const pending  = inbox.filter(i=>i.status==='pending');
  const approved = inbox.filter(i=>i.status==='approved');
  const rejected = inbox.filter(i=>i.status==='rejected');

  let h='<div style="padding-bottom:18px"><div class="sec-title">📥 صندوق الوارد</div>';
  const clientUrl=window.location.origin+window.location.pathname.replace('index.html','')+'client.html';
  h+='<div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px">🔗 رابط نموذج العميل الموحد</div>'
    +'<div class="link-box">'
    +'<div class="link-url">'+clientUrl+'</div>'
    +'<button class="link-copy-btn" onclick="copyClientLink()">📋 نسخ</button>'
    +'</div>';

  if(!inbox.length){
    return h+'<div class="empty"><div class="e-ic">📭</div><div class="e-t">لا توجد طلبات</div><div class="e-s">شارك رابط النموذج مع العملاء</div></div></div>';
  }

  if(pending.length){
    h+='<div class="sec-div"><span style="background:#f59e0b;color:#000;border-radius:8px;padding:1px 8px;font-size:10px">'+pending.length+'</span> طلبات معلقة</div>';
    pending.forEach(req=>{ h+=renderInboxCard(req); });
  }
  if(approved.length){
    h+='<div class="sec-div" style="color:#22c55e">✅ معتمدة ('+approved.length+')</div>';
    approved.forEach(req=>{ h+=renderInboxCard(req); });
  }
  if(rejected.length){
    h+='<div class="sec-div" style="color:var(--red)">❌ مرفوضة ('+rejected.length+')</div>';
    rejected.forEach(req=>{ h+=renderInboxCard(req); });
  }
  if(approved.length||rejected.length){
    h+='<button class="btn b-ghost" style="margin-top:10px;font-size:11px;padding:9px" onclick="clearProcessed()">🗑️ حذف المعتمدة والمرفوضة</button>';
  }
  return h+'</div>';
}

function renderInboxCard(req){
  const c=DC[req.direction]||{badge:'#64748b'};
  const isBuyer=req.clientType==='buyer';
  const statusChip=req.status==='pending'
    ?'<span style="background:#f59e0b;color:#000;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px">جديد</span>'
    :req.status==='approved'
      ?'<span style="background:#15803d;color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px">معتمد</span>'
      :'<span style="background:#991b1b;color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px">مرفوض</span>';
  return '<div class="inbox-card" onclick="openApprove(\''+req.id+'\')">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap">'
    +statusChip
    +(isBuyer?'<span class="mode-badge buyer">🛒 مشتري</span>':'<span class="mode-badge seller">🏷️ بائع</span>')
    +(req.direction?'<span class="chip" style="background:'+c.badge+'">'+req.direction+'</span>':'')
    +(req.propertyType?'<span style="font-size:10px;background:rgba(255,255,255,.06);color:var(--muted);padding:2px 7px;border-radius:6px;font-weight:800">'+req.propertyType+'</span>':'')
    +(req.city?'<span style="font-size:10px;background:rgba(59,130,246,.1);color:#60a5fa;padding:2px 7px;border-radius:6px;font-weight:800">'+x(req.city)+'</span>':'')
    +'</div>'
    +'<div class="date-badge">'+relativeDate(req.createdAt)+'</div></div>'
    +'<div style="font-size:14px;font-weight:900;color:var(--text);margin-bottom:2px">'+x(req.sellerName||'—')+'</div>'
    +'<div style="display:flex;justify-content:space-between">'
    +'<span style="color:var(--muted);font-size:11px;direction:ltr">'+x(req.sellerPhone||'')+'</span>'
    +'<span style="color:var(--primary);font-size:12px;font-weight:900">'
    +(isBuyer?(req.budgetMax?fp(req.budgetMax)+' ﷼':'—'):(req.price?fp(req.price)+' ﷼':'—'))
    +'</span></div>'
    +(req.neighborhood?'<div style="color:var(--dim);font-size:10px;margin-top:2px">📍 '+x(req.neighborhood)+'</div>':'')
    +'</div>';
}
