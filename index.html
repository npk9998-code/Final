<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العقارات والاستثمار</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header>
        <h1>نظام إدارة العقارات والاستثمارات المالية</h1>
        <nav>
            <button onclick="showSection('real-estate')">إدارة العقارات</button>
            <button onclick="showSection('investment')">حاسبة الاستثمار (CME-1)</button>
        </nav>
    </header>

    <main>
        <section id="real-estate" class="active">
            <h2>إضافة عقار جديد</h2>
            <form id="property-form">
                <input type="text" id="prop-title" placeholder="اسم العقار / العميل" required>
                <input type="number" id="prop-price" placeholder="السعر (بالريال)" required>
                <select id="prop-type">
                    <option value="للبيع">للبيع</option>
                    <option value="للإيجار">للإيجار</option>
                </select>
                <button type="submit">حفظ العقار</button>
            </form>
            <h3>قائمة العقارات الحالية</h3>
            <ul id="properties-list"></ul>
        </section>

        <section id="investment">
            <h2>حاسبة العائد الاستثماري المالي</h2>
            <form id="calc-form">
                <input type="number" id="invest-amount" placeholder="مبلغ الاستثمار الأساسي" required>
                <input type="number" id="invest-rate" placeholder="نسبة العائد السنوي (%)" required>
                <input type="number" id="invest-years" placeholder="عدد السنوات" required>
                <button type="submit">احسب العائد المتوقع</button>
            </form>
            <div id="calc-result"></div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
